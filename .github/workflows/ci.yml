name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Dummy values — every route is server-rendered on demand, so the
      # build only needs these to exist, never to connect.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_SECRET_KEY: ci-dummy-secret-key
      GEMINI_API_KEY: ci-dummy-gemini-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: i18n consistency (dict keys + t() coverage)
        run: node scripts/check_i18n.mjs

      - name: Build
        run: npx next build
