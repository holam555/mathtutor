<!--
  Supabase "Confirm signup" email template.

  How to install:
    Supabase Dashboard → Authentication → Email Templates → Confirm signup
    → paste this whole file into the "Message body" field → Save.

  Variables used (Supabase's built-in template syntax):
    {{ .ConfirmationURL }}  — the link the user clicks
    {{ .Email }}            — the address they signed up with
    {{ .SiteURL }}          — your app's configured Site URL

  Notes:
    - Inline styles only — most email clients strip <style> blocks.
    - Bilingual (繁體中文 primary / English secondary) to match the app.
    - {{ .SiteURL }}/logo.png must be a publicly reachable URL (it is,
      since /public/logo.png is served statically) for the logo to render.
-->
<div style="background-color:#F5F5F5; padding:32px 16px; font-family:'PingFang TC','Microsoft JhengHei',Arial,sans-serif;">
  <table role="presentation" width="100%" style="max-width:480px; margin:0 auto; background:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 1px 3px rgba(16,24,40,0.08);">
    <tr>
      <td style="padding:32px 32px 24px; text-align:center;">
        <img src="{{ .SiteURL }}/logo.png" alt="霖楓學苑 LF Academy" width="140" style="margin-bottom:8px;" />
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 8px; text-align:center;">
        <p style="font-size:20px; font-weight:700; color:#1a1a1a; margin:0 0 4px;">歡迎加入霖楓學苑！</p>
        <p style="font-size:13px; color:#8a8a8a; margin:0;">Welcome to LF Academy</p>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 32px 8px; text-align:center;">
        <p style="font-size:15px; line-height:1.7; color:#4a4a4a; margin:0 0 8px;">
          請點擊下方按鈕確認你的電郵地址（{{ .Email }}），即可開始使用數學練習平台。
        </p>
        <p style="font-size:13px; line-height:1.6; color:#9a9a9a; margin:0;">
          Please confirm your email address to activate your account.
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding:24px 32px; text-align:center;">
        <a href="{{ .ConfirmationURL }}"
           style="display:inline-block; background-color:#1D9E75; color:#ffffff; text-decoration:none; font-weight:700; font-size:15px; padding:14px 36px; border-radius:12px;">
          確認電郵 · Confirm Email
        </a>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 32px; text-align:center;">
        <p style="font-size:12px; color:#b0b0b0; margin:0 0 4px;">
          如按鈕無法點擊，請複製以下連結至瀏覽器：
        </p>
        <p style="font-size:11px; color:#c0c0c0; word-break:break-all; margin:0;">
          {{ .ConfirmationURL }}
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding:20px 32px; border-top:1px solid #f0f0f0; text-align:center;">
        <p style="font-size:11px; color:#c0c0c0; margin:0;">
          如果你並非本人註冊，請忽略此電郵。<br />
          If you didn't request this, you can safely ignore this email.
        </p>
      </td>
    </tr>
  </table>
</div>
